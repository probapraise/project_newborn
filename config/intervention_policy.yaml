cooldown_minutes: 15
max_interventions_per_hour: 3

escalation_levels:
  green: "gentle notice"
  yellow: "friction and confirmation"
  red: "stronger block during high-risk periods only"

exception_categories:
  - intentional_rest
  - fatigue
  - health
  - emergency
  - sensory_overload
  - emotional_overload
  - schedule_change
  - false_positive

shame_safe_language_rules:
  forbidden_terms:
    - "실패"
    - "위반"
    - "벌점"
    - "의지 부족"
    - "게으름"
  preferred_phrases:
    - "현재 계획과 감지된 활동이 어긋났습니다."
    - "지금 어떻게 처리할까요?"
    - "시스템 조정 제안으로 남깁니다."

decision_options:
  - code: return_now
    label: "지금 복귀"
    category: return_to_plan
  - code: intentional_rest
    label: "의도적 휴식으로 등록"
    category: intentional_rest
    default_duration_minutes: 15
  - code: fatigue
    label: "피로 예외"
    category: fatigue
    default_duration_minutes: 30
  - code: health
    label: "건강 예외"
    category: health
    default_duration_minutes: 60
  - code: overload
    label: "과부하 예외"
    category: sensory_overload
    default_duration_minutes: 30
  - code: adjust_plan
    label: "계획 자체를 수정"
    category: schedule_change
  - code: false_positive
    label: "오탐으로 표시"
    category: false_positive
